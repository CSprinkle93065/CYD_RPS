; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-2432s028r_cyd2usb

; Base environment for physical CYD2USB v3 hardware. NimBLE initializes
; normally and multiplayer BLE is available.
[env:esp32-2432s028r_cyd2usb]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.partitions = default.csv
lib_deps = 
	bodmer/TFT_eSPI @ ^2.5.43
	paulstoffregen/XPT2046_Touchscreen
	h2zero/NimBLE-Arduino @ ^1.4.0
	lvgl/lvgl@8.4.0
build_flags = 
	-D USER_SETUP_LOADED=1
	-include "${PROJECT_DIR}/include/User_Setup.h"
	-include "${PROJECT_DIR}/include/lv_conf.h"
	-D LV_CONF_INCLUDE_SIMPLE
	-D LV_CONF_PATH="${PROJECT_DIR}/include/lv_conf.h"
	-D CORE_DEBUG_LEVEL=3
	-D CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192

; Wokwi simulation environment. The ESP32 emulator does not fully support
; NimBLE; defining WOKWI_SIMULATION lets main.cpp skip BLE stack init so the
; firmware boots to SCR_Start without a task watchdog abort. Use this
; environment for `pio run` and Wokwi CLI smoke tests.
[env:esp32-2432s028r_cyd2usb_wokwi]
extends = env:esp32-2432s028r_cyd2usb
build_flags = 
	${env:esp32-2432s028r_cyd2usb.build_flags}
	-D WOKWI_SIMULATION
