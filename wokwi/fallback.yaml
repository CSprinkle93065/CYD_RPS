  - delay: 500ms
  - touch:
      part-id: lcd
      x: 120
      y: 170
      duration: 100ms
      wait: true
  - delay: 500ms
  - wait-serial: "UI: Play button clicked"
  - wait-serial: "CYD_RPS: Wokwi - BLE skipped, forcing single-player fallback"
